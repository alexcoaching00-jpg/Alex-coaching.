<div id="root"><div class="center"><p style="color:#666;font-family:Inter,sans-serif;font-size:14px">Connexion…</p></div></div>

<script>
/* Mini Supabase client — REST + Auth direct */
window.supabase={
  createClient(url,key){
    let _session=null;
    const headers=()=>({
      'Content-Type':'application/json',
      'apikey':key,
      'Authorization':'Bearer '+((_session&&_session.access_token)||key)
    });
    const base=url;
    // Auth
    const auth={
      _listeners:[],
      _notify(evt,sess){this._listeners.forEach(fn=>fn(evt,sess));},
      async signInWithPassword({email,password}){
        const r=await fetch(`${base}/auth/v1/token?grant_type=password`,{method:'POST',headers:{'Content-Type':'application/json','apikey':key},body:JSON.stringify({email,password})});
        const d=await r.json();
        if(!r.ok) return {data:null,error:{message:d.error_description||d.msg||'Erreur'}};
        _session=d; localStorage.setItem('sb_session',JSON.stringify(d));
        this._notify('SIGNED_IN',d); return {data:{session:d},error:null};
      },
      async signUp({email,password}){
        const r=await fetch(`${base}/auth/v1/signup`,{method:'POST',headers:{'Content-Type':'application/json','apikey':key},body:JSON.stringify({email,password})});
        const d=await r.json();
        if(!r.ok) return {data:null,error:{message:d.error_description||d.msg||'Erreur'}};
        if(d.access_token){_session=d;localStorage.setItem('sb_session',JSON.stringify(d));this._notify('SIGNED_IN',d);return {data:{session:d},error:null};}
        return {data:{session:null},error:null};
      },
      async signOut(){
        await fetch(`${base}/auth/v1/logout`,{method:'POST',headers:headers()}).catch(()=>{});
        _session=null;localStorage.removeItem('sb_session');
        this._notify('SIGNED_OUT',null); return {error:null};
      },
      async getSession(){
        if(_session) return {data:{session:_session},error:null};
        return {data:{session:null},error:null};
      },
      async getUser(){
        if(!_session) return {data:{user:null},error:null};
        return {data:{user:_session.user||{id:_session.user_id,email:_session.email}},error:null};
      },
      async resetPasswordForEmail(email,opts){
        const r=await fetch(`${base}/auth/v1/recover`,{method:'POST',headers:{'Content-Type':'application/json','apikey':key},body:JSON.stringify({email,redirectTo:opts&&opts.redirectTo})});
        const d=await r.json();
        return r.ok?{error:null}:{error:{message:d.error_description||'Erreur'}};
      },
      onAuthStateChange(fn){
        this._listeners.push(fn);
        // Restore session from localStorage
        try{
          const saved=localStorage.getItem('sb_session');
          if(saved){
            const sess=JSON.parse(saved);
            // Vérifier expiry
            const exp=sess.expires_at||sess.expires_in;
            const expired=exp&&(typeof exp==='number'&&exp<1e10?Date.now()/1000>exp:Date.now()/1000>new Date(exp).getTime()/1000);
            if(!expired){_session=sess;setTimeout(()=>fn('SIGNED_IN',sess),0);}
            else{localStorage.removeItem('sb_session');setTimeout(()=>fn('SIGNED_OUT',null),0);}
          } else {setTimeout(()=>fn('SIGNED_OUT',null),0);}
        }catch(e){setTimeout(()=>fn('SIGNED_OUT',null),0);}
        return {data:{subscription:{unsubscribe:()=>{}}}};
      }
    };
    // DB
    function qb(table){
      let _filters=[], _order=null, _single=false, _select='*';
      let _method='GET', _body=null;
      async function exec(){
        let path=`${base}/rest/v1/${table}?`;
        const params=[];
        if(_method==='GET') params.push('select='+_select);
        if(_filters.length) params.push(..._filters);
        if(_order) params.push('order='+_order);
        path+=params.join('&');
        const h={...headers()};
        if(_method==='GET'){
          if(_single) h['Accept']='application/vnd.pgrst.object+json';
        } else {
          h['Prefer']='return=representation';
        }
        const opts={method:_method,headers:h};
        if(_body!=null) opts.body=JSON.stringify(_body);
        let r;
        try{ r=await fetch(path,opts); }
        catch(e){ return {data:null,error:{message:'Réseau: '+e.message}}; }
        if(_method==='DELETE'){
          if(!r.ok){ const d=await r.json().catch(()=>({})); return {data:null,error:{message:d.message||'Erreur'}}; }
          return {data:null,error:null};
        }
        let d; try{ d=await r.json(); }catch(e){ d=null; }
        if(!r.ok) return {data:null,error:{message:(d&&(d.message||d.hint))||JSON.stringify(d)||('HTTP '+r.status)}};
        let out=d;
        if((_method==='POST'||_method==='PATCH') && Array.isArray(d) && _single!==false){ /* keep array unless single */ }
        return {data:d,error:null};
      }
      const q={
        select(cols){_select=cols||'*'; if(_method==='POST'||_method==='PATCH'){ /* return representation */ } return q;},
        eq(col,val){_filters.push(`${col}=eq.${encodeURIComponent(val)}`);return q;},
        order(col,o){const asc=!(o&&o.ascending===false);_order=`${col}.${asc?'asc':'desc'}`;return q;},
        single(){_single=true;return q;},
        insert(body){_method='POST';_body=body;return q;},
        update(body){_method='PATCH';_body=body;return q;},
        delete(){_method='DELETE';return q;},
        then(resolve,reject){
          return exec().then(res=>{
            // Pour insert/update avec .select().single() → renvoyer objet unique
            if((_method==='POST'||_method==='PATCH') && _single && Array.isArray(res.data)){
              res={data:res.data[0]||null,error:res.error};
            }
            resolve(res);
          },reject);
        }
      };
      return q;
    }
    return {auth, from:(table)=>qb(table)};
  }
};
</script>

const CFG_KEY="coachflow:cfg";
function loadCfg(){ try{ return JSON.parse(localStorage.getItem(CFG_KEY)||"null"); }catch(e){ return null; } }
function saveCfg(c){ try{ localStorage.setItem(CFG_KEY,JSON.stringify(c)); }catch(e){} }
function clearCfg(){ try{ localStorage.removeItem(CFG_KEY); }catch(e){} }

const SQL=`create table clients (
  id uuid primary key default gen_random_uuid(),
  coach_id uuid not null default auth.uid() references auth.users(id) on delete cascade,
  nom text not null, objectif text, formule text, niveau text, notes text,
  client_email text,
  date_debut date,
  program jsonb default '[]'::jsonb,
  mesures jsonb default '[]'::jsonb,
  seances jsonb default '[]'::jsonb,
  updated_at timestamptz default now()
);
alter table clients enable row level security;
create policy "coach gere ses clients" on clients
  for all using (auth.uid() = coach_id) with check (auth.uid() = coach_id);
create policy "client lit sa fiche" on clients
  for select using (lower(client_email) = lower(auth.jwt() ->> 'email'));
create policy "client met a jour sa fiche" on clients
  for update using (lower(client_email) = lower(auth.jwt() ->> 'email'))
  with check (lower(client_email) = lower(auth.jwt() ->> 'email'));`;

let cfg={url:SUPA_URL,key:SUPA_KEY};
let CONFIGURED = true;
let sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

const FORMULES=["Individuel","Duo","Petit groupe"];
const NIVEAUX=["Débutant","Intermédiaire","Confirmé"];
const RESSENTIS=["Facile","Bien","Difficile","Fatiguée"];

const S={ role:"coach", view:"dashboard", detailTab:"infos", clientTab:"programme",
  selectedId:null, clients:[], session:null, loading:false, isClient:false,
  authView:"login", authErr:"", authBusy:false, showSettings:false, cfgErr:"" };

const uid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().slice(0,10);
const frDate=iso=>{if(!iso)return"";const[y,m,d]=iso.split("-");return `${d}/${m}/${y.slice(2)}`;};
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const val=id=>{const e=document.getElementById(id);return e?e.value:"";};
const sel=()=>S.clients.find(c=>c.id===S.selectedId)||null;

const rowToClient=r=>({id:r.id,nom:r.nom,objectif:r.objectif||"",formule:r.formule||FORMULES[0],niveau:r.niveau||NIVEAUX[0],notes:r.notes||"",clientEmail:r.client_email||"",dateDebut:r.date_debut||"",objectifPoids:r.objectif_poids||null,forfaitTotal:r.forfait_total||null,prochainRdv:r.prochain_rdv||"",program:r.program||[],mesures:r.mesures||[],seances:r.seances||[],messages:r.messages||[],photos:r.photos||[]});
const clientToRow=c=>({nom:c.nom,objectif:c.objectif||null,formule:c.formule||null,niveau:c.niveau||null,notes:c.notes||null,client_email:(c.clientEmail||"").trim().toLowerCase()||null,date_debut:c.dateDebut||null,objectif_poids:c.objectifPoids||null,forfait_total:c.forfaitTotal||null,prochain_rdv:c.prochainRdv||null,program:c.program||[],mesures:c.mesures||[],seances:c.seances||[],messages:c.messages||[],photos:c.photos||[],updated_at:new Date().toISOString()});

let toastT=null;
function toast(msg){const t=document.getElementById("toast");if(!t)return;t.textContent=msg;t.style.display="block";clearTimeout(toastT);toastT=setTimeout(()=>t.style.display="none",1200);}

const timers={};
function save(){const c=sel();if(!c||!sb)return;clearTimeout(timers[c.id]);timers[c.id]=setTimeout(()=>{
  sb.from("clients").update(clientToRow(c)).eq("id",c.id).then(({error})=>toast(error?"Erreur de sync":"Synchronisé"));
},350);}

// Recharge les données depuis Supabase sans casser l'onglet/vue en cours
async function reloadKeepingView(){
  if(!sb) return;
  try{
    const {data:rows}=await sb.from("clients").select("*");
    if(!rows) return;
    const uidNow=S.session&&S.session.user?S.session.user.id:null;
    if(S.isClient){
      const mine=rows.find(r=>r.coach_id!==uidNow);
      if(mine){ S.clients=[rowToClient(mine)]; S.selectedId=mine.id; }
    } else {
      const keepId=S.selectedId;
      S.clients=rows.filter(r=>r.coach_id===uidNow).map(rowToClient);
      S.selectedId=keepId;
    }
    render();
  }catch(e){}
}

async function loadClients(silent){
  if(!sb)return;
  if(!silent){ S.loading=true; render(); }
  const uidNow=S.session&&S.session.user?S.session.user.id:null;

  const {data:allRows, error}=await sb.from("clients").select("*");
  const rows=allRows||[];
  const coachRows=rows.filter(r=>r.coach_id===uidNow);
  const clientRows=rows.filter(r=>r.coach_id!==uidNow);

  if(clientRows.length>0 && coachRows.length===0){
    // Espace client
    const mine=clientRows[0];
    S.isClient=true; S.role="client";
    if(!silent && !S.clientTab) S.clientTab="programme";
    if(!S.clientTab) S.clientTab="programme";
    S.clients=[rowToClient(mine)]; S.selectedId=mine.id; S.loading=false; render(); return;
  }

  // Espace coach
  S.isClient=false; S.role="coach";
  S.clients=coachRows.map(rowToClient);
  S.loading=false; render();
}

function chart(mesures){
  const pts=(mesures||[]).filter(m=>typeof m.poids==="number");
  if(pts.length<2) return `<div class="chart-empty">Ajoutez au moins deux mesures pour voir la courbe de progression.</div>`;
  const W=440,H=180,pad={l:34,r:14,t:14,b:24};
  const ys=pts.map(m=>m.poids),minY=Math.min(...ys)-1,maxY=Math.max(...ys)+1;
  const px=i=>pad.l+(i/(pts.length-1))*(W-pad.l-pad.r);
  const py=v=>pad.t+(1-(v-minY)/(maxY-minY||1))*(H-pad.t-pad.b);
  const line=pts.map((m,i)=>`${px(i).toFixed(1)},${py(m.poids).toFixed(1)}`).join(" ");
  const dots=pts.map((m,i)=>`<circle cx="${px(i).toFixed(1)}" cy="${py(m.poids).toFixed(1)}" r="4" fill="#C1121F"/>`).join("");
  const xlab=pts.map((m,i)=>`<text x="${px(i).toFixed(1)}" y="${H-6}" font-size="10" fill="#6B7770" text-anchor="middle">${frDate(m.date)}</text>`).join("");
  const grid=[0,.5,1].map(t=>{const y=pad.t+t*(H-pad.t-pad.b),v=(maxY-t*(maxY-minY)).toFixed(1);
    return `<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#DBE0D6" stroke-dasharray="3 3"/><text x="4" y="${y+3}" font-size="9" fill="#6B7770">${v}</text>`;}).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Courbe de poids">${grid}<polyline points="${line}" fill="none" stroke="#C1121F" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>${dots}${xlab}</svg>`;
}

    ${(S.clients.length>1&&prog.length)?`<div class="panel" style="margin-top:12px">
      <div class="ph" style="font-size:14px">Dupliquer ce programme</div>
      <div class="r2" style="align-items:flex-end">
        <label class="fld" style="flex:2;margin-bottom:0"><span>Vers le client</span><select id="dup-target">${S.clients.filter(x=>x.id!==c.id).map(x=>`<option value="${x.id}">${esc(x.nom)}</option>`).join("")}</select></label>
        <button class="btn g" data-act="dup-program" style="flex:1">Copier</button>
      </div>
      <p class="muted" style="font-size:12px;margin-top:8px">Copie tous les exercices (le programme existant du client cible sera remplacé).</p>
    </div>`:""}`:"";
  return list+form;
}
function progres(c,editable){
  const ms=c.mesures||[];
  const form=editable?`
    <div class="panel" style="margin-bottom:14px"><div class="ph">Nouvelle mesure — ${frDate(today())}</div>
      <div class="r2"><label class="fld"><span>Poids (kg)</span><input id="me-poids" inputmode="decimal" placeholder="70.5"></label>
      <label class="fld"><span>Taille (cm)</span><input id="me-taille" inputmode="decimal" placeholder="82"></label>
      <label class="fld"><span>Hanches (cm)</span><input id="me-hanches" inputmode="decimal" placeholder="98"></label></div>
      <label class="fld"><span>Note</span><input id="me-note" placeholder="Ressenti, remarque…"></label>
      <button class="btn p full" data-act="add-me">Enregistrer la mesure</button></div>`:"";
  const rows=ms.map((m,i)=>({m,i})).reverse().map(({m,i})=>`
    <div class="mrow"><div><span class="mv">${m.poids} kg</span><span class="md">${frDate(m.date)}</span>${m.taille||m.hanches?`<div class="md" style="margin-left:0">${m.taille?`Taille ${m.taille} cm`:''}${m.taille&&m.hanches?' · ':''}${m.hanches?`Hanches ${m.hanches} cm`:''}</div>`:""}${m.note?`<div class="md" style="margin-left:0">${esc(m.note)}</div>`:""}</div>
    ${editable?`<button class="x" data-act="del-me" data-idx="${i}">×</button>`:""}</div>`).join("");
  return `<div class="chartbox">${chart(ms)}</div>${form}${rows}`;
}
function seancesTab(c,editable){
  const ss=c.seances||[];
  const form=editable?`
    <div class="panel" style="margin-bottom:14px"><div class="ph">Enregistrer une séance — ${frDate(today())}</div>
      <div class="r2"><label class="fld" style="flex:1"><span>Ressenti</span><select id="se-ressenti">${RESSENTIS.map(r=>`<option>${r}</option>`).join("")}</select></label>
      <label class="fld" style="flex:2"><span>Note</span><input id="se-note" placeholder="Charge, douleur, remarque…"></label></div>
      <button class="btn p full" data-act="add-se">Séance réalisée ✓</button></div>`:"";
  const rows=ss.length?ss.map((s,i)=>`
    <div class="srow"><button class="chk ${s.fait?'on':''}" ${editable?`data-act="toggle-se" data-idx="${i}"`:""}>${s.fait?'✓':''}</button>
    <div style="flex:1"><div style="font-weight:700;font-size:14px">${frDate(s.date)} · ${esc(s.ressenti)}</div>${s.note?`<div class="md" style="margin-left:0">${esc(s.note)}</div>`:""}</div>
    ${editable?`<button class="x" data-act="del-se" data-idx="${i}">×</button>`:""}</div>`).join("")
    : `<p class="muted">Aucune séance enregistrée.</p>`;
  return form+rows;
}
function clientSpace(c){
  if(!c)return `<p class="muted" style="text-align:center;margin-top:40px">Sélectionnez un client en haut de l'écran.</p>`;
  const r=forfaitRestant(c);
  const rdv=c.prochainRdv?new Date(c.prochainRdv):null;
  const banner=`<div class="cbanner"><div class="lab">Votre objectif</div><div class="obj">${esc(c.objectif||"—")}</div>
    ${(r!==null||rdv)?`<div style="display:flex;gap:14px;margin-top:10px;font-size:12.5px;color:rgba(255,255,255,.85)">
      ${r!==null?`<span>Séances restantes : <b>${r}</b></span>`:''}
      ${rdv&&rdv>=new Date(Date.now()-3600*1000)?`<span>Prochain RDV : <b>${rdv.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} ${rdv.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</b></span>`:''}
    </div>`:''}</div>`;
  let inner=S.clientTab==="programme"?programme(c,false):S.clientTab==="progres"?progres(c,true):S.clientTab==="messages"?messagesTab(c,false):S.clientTab==="photos"?photosTab(c,true):seancesTab(c,true);
  return banner+inner;
}
function addModal(){
  const o=arr=>arr.map(x=>`<option>${x}</option>`).join("");
  return `<div class="overlay" data-act="modal-bg"><div class="sheet" data-stop>
    <div class="sh"><h2>Nouveau client</h2><button class="x" style="font-size:22px" data-act="modal-close">×</button></div>
    <label class="fld"><span>Nom du client</span><input id="ac-nom" placeholder="Ex. Madeleine D."></label>
    <label class="fld"><span>Objectif</span><input id="ac-obj" placeholder="Ex. Autonomie, perte de poids…"></label>
    <div class="r2"><label class="fld"><span>Formule</span><select id="ac-formule">${o(FORMULES)}</select></label>
    <label class="fld"><span>Niveau</span><select id="ac-niveau">${o(NIVEAUX)}</select></label></div>
    <div class="r2" style="margin-top:4px"><button class="btn g full" data-act="modal-close">Annuler</button>
    <button class="btn p full" data-act="modal-create">Créer le client</button></div></div></div>`;
}



/* forfait : séances restantes */
function forfaitRestant(c){
  if(!c.forfaitTotal) return null;
  const done=(c.seances||[]).filter(s=>s.fait).length;
  return Math.max(0, c.forfaitTotal - done);
}

/* ===== MESSAGES ===== */
function messagesTab(c,isCoach){
  const msgs=(c.messages||[]);
  const rows=msgs.length
    ? msgs.map(m=>`<div class="msg ${m.from==='coach'?'coach':'client'}">
        ${esc(m.text)}
        <div class="mt">${frDate(m.date.slice(0,10))} · ${m.date.slice(11,16)}</div>
      </div>`).join("")
    : `<p class="muted" style="text-align:center;padding:20px 0">Aucun message.</p>`;
  const role=isCoach?'coach':'client';
  return `<div class="msg-list" id="msg-list">${rows}</div>
    <div class="msg-input">
      <textarea id="msg-text" placeholder="Écrire un message…" rows="1"></textarea>
      <button class="btn p" data-act="send-msg" data-role="${role}" style="padding:10px 14px;font-size:18px;flex-shrink:0">➤</button>
    </div>`;
}

/* ===== PHOTOS BILAN ===== */
function photosTab(c,editable){
  const photos=(c.photos||[]);
  const grid=photos.map((p,i)=>`
    <div class="photo-item">
      <img src="${p.url}" alt="Bilan ${i+1}" loading="lazy">
      ${editable?`<button class="photo-del" data-act="del-photo" data-idx="${i}">×</button>`:""}
      <div class="photo-label">${esc(p.label||frDate(p.date))}</div>
    </div>`).join("");
  const addBtn=editable?`
    <label class="photo-add" title="Ajouter une photo">
      <span>+</span>
      <input type="file" accept="image/*" style="display:none" data-act="add-photo">
    </label>`:"";
  return `<div class="photo-grid">${grid}${addBtn}</div>
    ${!photos.length&&!editable?`<p class="muted" style="text-align:center">Aucune photo pour l'instant.</p>`:""}`;
}

/* ===== actions async ===== */
async function doAuth(mode){
  const email=val("au-email").trim(), pw=val("au-pw");
  if(!email||!pw){ S.authErr="Renseignez e-mail et mot de passe."; render(); return; }
  if(mode==="signup"){
    const pw2=val("au-pw2");
    if(pw!==pw2){ S.authErr="Les deux mots de passe ne correspondent pas."; render(); return; }
    if(pw.length<8){ S.authErr="Le mot de passe doit faire au moins 8 caractères."; render(); return; }
  }
  S.authErr=""; S.authBusy=true; render();
  let data, error;
  if(mode==="signup"){
    ({data,error}=await sb.auth.signUp({email,password:pw}));
    if(!error&&!data.session){ S.authBusy=false; S.authView="login"; S.authErr="Compte créé. Connectez-vous."; render(); return; }
  } else {
    ({data,error}=await sb.auth.signInWithPassword({email,password:pw}));
  }
  S.authBusy=false;
  if(error){ S.authErr=error.message; render(); return; }
}
async function inviteClient(){
  const c=sel(); if(!c) return;
  const email=(c.clientEmail||"").trim().toLowerCase();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){
    alert("Renseignez d'abord une adresse e-mail valide pour ce client."); return;
  }
  // 1. Enregistre l'e-mail sur la fiche
  const {error:upErr}=await sb.from("clients").update(clientToRow(c)).eq("id",c.id);
  if(upErr){ alert("Enregistrement impossible : "+upErr.message); return; }
  // 2. Appelle la Edge Function (qui utilise la clé service_role côté serveur)
  toast("Envoi en cours…");
  const {data:{session}}=await sb.auth.getSession();
  const token=session?.access_token;
  const res=await fetch(`${SUPA_URL}/functions/v1/invite-client`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token,
      "apikey": SUPA_KEY
    },
    body:JSON.stringify({clientEmail:email, clientId:c.id})
  });
  const json=await res.json();
  if(!res.ok||json.error){
    alert("Envoi impossible : "+(json.error||res.statusText)); return;
  }
  const msg=json.mode==="reset"
    ? "Un lien de connexion a été envoyé à "+email+" (compte existant)."
    : "Invitation envoyée à "+email+".\n\nIl recevra un lien pour créer son mot de passe et accéder à son espace.";
  alert(msg);
}

async function createClientFromModal(){
  const nom=val("ac-nom").trim(); if(!nom) return;
  const c={nom,objectif:val("ac-obj"),formule:val("ac-formule"),niveau:val("ac-niveau"),notes:"",dateDebut:today(),program:[],mesures:[],seances:[]};
  const {data,error}=await sb.from("clients").insert(clientToRow(c)).select().single();
  if(error){ alert("Création impossible : "+error.message); return; }
  const created=rowToClient(data);
  S.clients.push(created); S.selectedId=created.id; S.showAdd=false; S.view="detail"; S.detailTab="infos"; render();
}
async function addSample(){
  const {data,error}=await sb.from("clients").insert(clientToRow(sampleObj())).select().single();
  if(error){ alert("Import impossible : "+error.message); return; }
  S.clients.push(rowToClient(data)); render();
}
function deleteSelected(){
  const id=S.selectedId;
  S.clients=S.clients.filter(x=>x.id!==id); S.selectedId=null; S.view="clients"; S.confirmDel=false; render();
  sb.from("clients").delete().eq("id",id).then(({error})=>{ if(error) alert("Suppression non synchronisée : "+error.message); });
}

/* ===== events ===== */
document.addEventListener("click",e=>{
  const t=e.target.closest("[data-act]"); if(!t) return;
  const a=t.dataset.act, c=sel();
  switch(a){
    case "auth-switch": S.authView=t.dataset.to; S.authErr=""; render(); break;
    case "auth-submit": doAuth(t.dataset.mode); break;
    case "logout": if(sb) sb.auth.signOut(); break;
    case "invite": inviteClient(); break;
    case "role": S.role=t.dataset.role; if(S.role==="client"&&!S.selectedId&&S.clients[0]) S.selectedId=S.clients[0].id; render(); break;
    case "nav": S.view=t.dataset.view; render(); break;
    case "nav-client": S.clientTab=t.dataset.ctab;
      render();
      if(t.dataset.ctab==="messages"){ reloadKeepingView(); }
      break;
    case "open": S.selectedId=t.dataset.id; S.view="detail"; S.detailTab="infos"; S.confirmDel=false; render(); break;
    case "back": S.view="clients"; render(); break;
    case "dtab": S.detailTab=t.dataset.dtab; S.confirmDel=false;
      render();
      if(t.dataset.dtab==="messages"){
        reloadKeepingView().then(()=>{
          const cc=sel(); if(!cc) return;
          let changed=false;
          (cc.messages||[]).forEach(m=>{ if(m.from==="client"&&!m.lu){ m.lu=true; changed=true; } });
          if(changed){ sb.from("clients").update(clientToRow(cc)).eq("id",cc.id).then(()=>{}); render(); }
        });
      }
      break;
    case "add-open": S.showAdd=true; render(); break;
    case "modal-close": S.showAdd=false; render(); break;
    case "modal-bg": if(!e.target.closest("[data-stop]")){ S.showAdd=false; render(); } break;
    case "modal-create": createClientFromModal(); break;
    case "sample": addSample(); break;
    case "del-open": S.confirmDel=true; render(); break;
    case "del-cancel": S.confirmDel=false; render(); break;
    case "del-confirm": deleteSelected(); break;
    case "add-ex":{ if(!c) return; const nom=val("ex-nom").trim(); if(!nom) return;
      c.program=c.program||[]; c.program.push({id:uid(),nom,series:+val("ex-series")||3,reps:val("ex-reps"),charge:val("ex-charge"),repos:val("ex-repos"),note:val("ex-note"),bloc:val("ex-bloc")||"",rir:val("ex-rir")||"",historique:[]});
      save(); render(); break; }
    case "del-ex": if(c){ c.program=(c.program||[]).filter(x=>x.id!==t.dataset.id); save(); render(); } break;
    case "dup-program":{ if(!c) return;
      const targetId=val("dup-target"); if(!targetId) return;
      const target=S.clients.find(x=>x.id===targetId); if(!target) return;
      if(!confirm(`Copier le programme de ${c.nom} vers ${target.nom} ?\nSon programme actuel sera remplacé.`)) return;
      target.program=(c.program||[]).map(e=>({...e,id:uid(),historique:[]}));
      sb.from("clients").update(clientToRow(target)).eq("id",target.id).then(({error})=>{
        toast(error?"Erreur de copie":"Programme copié vers "+target.nom);
      });
      break; }
    case "log-charge":{ if(!c) return;
      const ex=(c.program||[]).find(x=>x.id===t.dataset.id); if(!ex) return;
      const v=prompt(`Charge du jour pour « ${ex.nom} » ?\n(ex : 45 kg, 12 reps à 40 kg…)`, ex.historique&&ex.historique.length?ex.historique[ex.historique.length-1].charge:"");
      if(!v||!v.trim()) return;
      ex.historique=ex.historique||[];
      ex.historique.push({date:today(),charge:v.trim()});
      // garder les 20 dernières entrées max
      if(ex.historique.length>20) ex.historique=ex.historique.slice(-20);
      save(); render(); break; }
    case "add-me":{ if(!c) return; const p=parseFloat(String(val("me-poids")).replace(",",".")); if(isNaN(p)) return;
      const taille=parseFloat(String(val("me-taille")).replace(",","."));
      const hanches=parseFloat(String(val("me-hanches")).replace(",","."));
      const m={date:today(),poids:p,note:val("me-note")};
      if(!isNaN(taille)) m.taille=taille;
      if(!isNaN(hanches)) m.hanches=hanches;
      c.mesures=c.mesures||[]; c.mesures.push(m); c.mesures.sort((x,y)=>x.date.localeCompare(y.date)); save(); render(); break; }
    case "del-me": if(c){ c.mesures=(c.mesures||[]).filter((_,i)=>i!==+t.dataset.idx); save(); render(); } break;
    case "add-se":{ if(!c) return; c.seances=c.seances||[]; c.seances.push({date:today(),fait:true,ressenti:val("se-ressenti"),note:val("se-note")}); c.seances.sort((x,y)=>y.date.localeCompare(x.date)); save(); render(); break; }
    case "toggle-se": if(c){ const i=+t.dataset.idx; c.seances[i].fait=!c.seances[i].fait; save(); render(); } break;
    case "del-se": if(c){ c.seances=(c.seances||[]).filter((_,i)=>i!==+t.dataset.idx); save(); render(); } break;
    case "send-msg":{ if(!c) return;
      const txt=(document.getElementById("msg-text").value||"").trim(); if(!txt) return;
      const role=t.dataset.role||"coach";
      c.messages=c.messages||[];
      c.messages.push({from:role,text:txt,date:new Date().toISOString(),lu:role==="coach"});
      // Sauvegarde immédiate (pas de debounce pour les messages)
      sb.from("clients").update(clientToRow(c)).eq("id",c.id).then(({error})=>{
        if(error) toast("Erreur envoi");
        else toast("Message envoyé");
      });
      render();
      setTimeout(()=>{const ml=document.getElementById("msg-list");if(ml)ml.scrollTop=ml.scrollHeight;},50);
      break; }
    case "del-photo": if(c){ c.photos=(c.photos||[]).filter((_,i)=>i!==+t.dataset.idx); save(); render(); } break;
    case "export":{
      const payload={app:"Alex Coaching",version:1,exportedAt:new Date().toISOString(),clients:S.clients};
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
      const url=URL.createObjectURL(blob),link=document.createElement("a");
      link.href=url; link.download=`coachflow-sauvegarde-${today()}.json`; document.body.appendChild(link); link.click(); link.remove();
      setTimeout(()=>URL.revokeObjectURL(url),1000); break; }
  }
});
document.addEventListener("input",e=>{
  const eln=e.target.closest("[data-bind-num]");
  if(eln){ const c=sel(); if(!c) return; const v=parseFloat(String(eln.value).replace(",",".")); c[eln.dataset.bindNum]=isNaN(v)?null:v; save(); return; }
  const el=e.target.closest("[data-bind]"); if(!el) return;
  const c=sel(); if(!c) return; c[el.dataset.bind]=el.value; save();
});
document.addEventListener("change",e=>{
  const photoInput=e.target.closest('[data-act="add-photo"]');
  if(photoInput && photoInput.files && photoInput.files[0]){
    const file=photoInput.files[0]; const c=sel(); if(!c) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      c.photos=c.photos||[];
      c.photos.push({url:ev.target.result,date:new Date().toISOString().slice(0,10),label:""});
      save(); render();
    };
    reader.readAsDataURL(file); return;
  }
  const pick=e.target.closest('[data-act="pick-client"]');
  if(pick){ S.selectedId=pick.value; render(); return; }
  const b=e.target.closest("[data-bind]");
  if(b&&(b.dataset.bind==="formule"||b.dataset.bind==="niveau")){ const c=sel(); if(c){ c[b.dataset.bind]=b.value; save(); render(); } }
});

/* ===== boot ===== */
function bootApp(){
  sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  render();
  sb.auth.onAuthStateChange((_evt,session)=>{
    S.session=session||null;
    if(session){ loadClients(); } else { S.clients=[]; S.isClient=false; render(); }
  });
  // Rafraîchit automatiquement les messages toutes les 8 s quand on est dans l'onglet Messages
  setInterval(()=>{
    const onMsg=(S.isClient && S.clientTab==="messages") || (!S.isClient && S.view==="detail" && S.detailTab==="messages");
    if(onMsg && S.session){ reloadKeepingView(); }
  }, 8000);
}
bootApp();
</script>
