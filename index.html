      if(!confirm(`Supprimer le modèle « ${tpl.nom} » ?`)) return;
      sb.from("templates").delete().eq("id",id2).then(({error})=>{
        if(!error){ S.templates=S.templates.filter(x=>x.id!==id2); toast("Modèle supprimé"); render(); }
      });
      break; }
    case "dup-program":{ if(!c) return;
      const targetId=val("dup-target"); if(!targetId) return;
      const target=S.clients.find(x=>x.id===targetId); if(!target) return;
      if(!confirm(`Copier le programme de ${c.nom} vers ${target.nom} ?\nSon programme actuel sera remplacé.`)) return;
      target.program=(c.program||[]).map(e=>({...e,id:uid(),historique:[]}));
      sb.from("clients").update(clientToRow(target)).eq("id",target.id).then(({error})=>{
        toast(error?"Erreur de copie":"Programme copié vers "+target.nom);
      });
      break; }
    case "timer": startTimer(t.dataset.id, +t.dataset.secs||60, t.dataset.exo||""); break;
    case "tmr-cancel": stopTimer(); break;
    case "tmr-close-done": closeBigTimer(); break;
    case "tmr-add15":{ if(!TIMER.exId) break;
      TIMER.end+=15000; TIMER.total=(TIMER.total||0)+15;
      const left2=Math.max(0,Math.round((TIMER.end-Date.now())/1000));
      paintBigTimer(left2,TIMER.total,TIMER.label,false);
      const bb2=document.getElementById("tmr-"+TIMER.exId); if(bb2) bb2.textContent="⏱ "+Math.floor(left2/60)+":"+String(left2%60).padStart(2,"0");
      break; }
    case "start-wk": openWorkout(t.dataset.jour); break;
    case "wk-done": wkSerieDone(); break;
    case "wk-skip": wkSkipRest(); break;
    case "wk-close": closeWorkout(false); break;
    case "wk-close-force": closeWorkout(true); break;
    case "wk-prev": if(WK.on){ if(WK.serie>1){WK.serie--;} else if(WK.idx>0){WK.idx--; WK.serie=WK.exos[WK.idx].series||1;} wkSkipRest(); } break;
    case "wk-next": if(WK.on&&WK.idx<WK.exos.length-1){ WK.idx++; WK.serie=1; wkSkipRest(); } break;
    case "wk-charge":{ if(!WK.on) break;
      const ex=WK.exos[WK.idx];
      const v=prompt(`Charge du jour pour « ${ex.nom} » ?`, ex.historique&&ex.historique.length?ex.historique[ex.historique.length-1].charge:"");
      if(v&&v.trim()){ ex.historique=ex.historique||[]; ex.historique.push({date:today(),charge:v.trim()}); if(ex.historique.length>20)ex.historique=ex.historique.slice(-20); save(); wkRender(); }
      break; }
    case "log-charge":{ if(!c) return;
      const ex=(c.program||[]).find(x=>x.id===t.dataset.id); if(!ex) return;
      const v=prompt(`Charge du jour pour « ${ex.nom} » ?\n(ex : 45 kg, 12 reps à 40 kg…)`, ex.historique&&ex.historique.length?ex.historique[ex.historique.length-1].charge:"");
      if(!v||!v.trim()) return;
      ex.historique=ex.historique||[];
      ex.historique.push({date:today(),charge:v.trim()});
      // garder les 20 dernières entrées max
      if(ex.historique.length>20) ex.historique=ex.historique.slice(-20);
      save(); render(); break; }
    case "add-me":{ if(!c) return; const p=parseFloat(String(val("me-poids")).replace(",",".")); if(isNaN(p)) return;
      const taille=parseFloat(String(val("me-taille")).replace(",","."));
      const hanches=parseFloat(String(val("me-hanches")).replace(",","."));
      const m={date:today(),poids:p,note:val("me-note")};
      if(!isNaN(taille)) m.taille=taille;
      if(!isNaN(hanches)) m.hanches=hanches;
      c.mesures=c.mesures||[]; c.mesures.push(m); c.mesures.sort((x,y)=>x.date.localeCompare(y.date)); save(); render(); break; }
    case "del-me": if(c){ c.mesures=(c.mesures||[]).filter((_,i)=>i!==+t.dataset.idx); save(); render(); } break;
    case "add-se":{ if(!c) return; c.seances=c.seances||[]; c.seances.push({date:today(),fait:true,ressenti:val("se-ressenti"),note:val("se-note")}); c.seances.sort((x,y)=>y.date.localeCompare(x.date)); save(); render(); break; }
    case "toggle-se": if(c){ const i=+t.dataset.idx; c.seances[i].fait=!c.seances[i].fait; save(); render(); } break;
    case "del-se": if(c){ c.seances=(c.seances||[]).filter((_,i)=>i!==+t.dataset.idx); save(); render(); } break;
    case "toggle-compare": S.photoCompare=!S.photoCompare; render(); break;
    case "send-checkin":{ if(!c) return;
      const g=k=>{const el2=document.getElementById("ci-"+k);return el2?+el2.value:3;};
      const entry={date:today(),energie:g("energie"),sommeil:g("sommeil"),motivation:g("motivation"),courbatures:g("courbatures"),note:(val("ci-note")||"").trim()};
      c.checkins=c.checkins||[]; c.checkins.push(entry);
      if(c.checkins.length>30) c.checkins=c.checkins.slice(-30);
      patchField(c,"checkins",err=>toast(err?"Erreur d'envoi":"Check-in envoyé — merci !"));
      // Prévenir le coach dans la conversation
      const moy=((entry.energie+entry.sommeil+entry.motivation+entry.courbatures)/4).toFixed(1);
      c.messages=c.messages||[];
      c.messages.push({from:"client",text:`📋 Check-in : énergie ${entry.energie}/5 · sommeil ${entry.sommeil}/5 · motivation ${entry.motivation}/5 · récup ${entry.courbatures}/5 (moy. ${moy})${entry.note?` — « ${entry.note} »`:""}`,date:new Date().toISOString(),lu:false});
      patchField(c,"messages",()=>{});
      render(); break; }
    case "install-help":{
      const isiOS=/iPhone|iPad|iPod/i.test(navigator.userAgent);
      const ov=document.createElement("div");
      ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:center;justify-content:center;padding:22px";
      ov.innerHTML=`<div style="background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;max-width:340px;width:100%">
        <h3 style="font-family:'Bebas Neue';font-size:22px;letter-spacing:.05em;color:var(--white);margin-bottom:12px">📲 Installer l'appli</h3>
        <p style="font-size:13.5px;color:var(--white2);line-height:1.55;margin-bottom:10px"><b style="color:var(--red)">iPhone / iPad</b> — Dans Safari : bouton <b>Partager</b> (carré avec flèche) → <b>« Sur l'écran d'accueil »</b> → Ajouter.</p>
        <p style="font-size:13.5px;color:var(--white2);line-height:1.55;margin-bottom:14px"><b style="color:var(--red)">Android</b> — Dans Chrome : menu <b>⋮</b> → <b>« Ajouter à l'écran d'accueil »</b> (ou « Installer l'application »).</p>
        <p style="font-size:12.5px;color:var(--grey);margin-bottom:16px">L'appli s'ouvre alors en plein écran, avec le logo Alex Coaching, comme une vraie application.</p>
        <button class="btn p full" data-close-install>Compris</button>
      </div>`;
      ov.addEventListener("click",ev=>{ if(ev.target===ov||ev.target.closest("[data-close-install]")) ov.remove(); });
      document.body.appendChild(ov);
      break; }
    case "pick-msg-photo":{ const f=document.getElementById("msg-photo"); if(f) f.click(); break; }
    case "view-img":{
      const ov=document.createElement("div");
      ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;cursor:pointer";
      ov.innerHTML=`<img src="${t.src}" style="max-width:100%;max-height:100%;border-radius:12px">`;
      ov.onclick=()=>ov.remove();
      document.body.appendChild(ov); break; }
    case "rec-voice": toggleVoice(t.dataset.role||"coach"); break;
    case "send-msg":{ if(!c) return;
      const txt=(document.getElementById("msg-text").value||"").trim(); if(!txt) return;
      const role=t.dataset.role||"coach";
      c.messages=c.messages||[];
      c.messages.push({from:role,text:txt,date:new Date().toISOString(),lu:role==="coach"});
      // Patch ciblé : uniquement le champ messages (fiable même avec de longs textes)
      patchField(c,"messages",err=>toast(err?"Erreur envoi":"Message envoyé"));
      render();
      setTimeout(()=>{const ml=document.getElementById("msg-list");if(ml)ml.scrollTop=ml.scrollHeight;},50);
      break; }
    case "print-bilan": if(c) printBilan(c); break;
    case "add-bilan":{ if(!c) return;
      const g=id2=>{const el2=document.getElementById(id2);if(!el2)return null;const v=parseFloat(String(el2.value).replace(",","."));return isNaN(v)?null:v;};
      const poids=g("bl-poids"), tcm=g("bl-tcm");
      const b={date:today(),poids:poids,taille:g("bl-taille"),brasD:g("bl-brasD"),brasG:g("bl-brasG"),cuisseD:g("bl-cuisseD"),cuisseG:g("bl-cuisseG"),note:val("bl-note")||""};
      if(poids==null&&b.taille==null&&b.brasD==null&&b.brasG==null&&b.cuisseD==null&&b.cuisseG==null) return;
      if(tcm!=null) c.tailleCm=tcm;
      if(poids!=null){
        c.mesures=c.mesures||[];
        const i=c.mesures.findIndex(m=>m.date===b.date);
        if(i>=0) c.mesures[i].poids=poids; else c.mesures.push({date:b.date,poids:poids,note:"Bilan"});
        c.mesures.sort((x,y)=>x.date.localeCompare(y.date));
        save();
      } else if(tcm!=null){ save(); }
      c.bilans=c.bilans||[]; c.bilans.push(b);
      patchField(c,"bilans"); render(); break; }
    case "del-bilan": if(c){ c.bilans=(c.bilans||[]).filter((_,i)=>i!==+t.dataset.idx); patchField(c,"bilans"); render(); } break;
    case "del-photo": if(c){ c.photos=(c.photos||[]).filter((_,i)=>i!==+t.dataset.idx); patchField(c,"photos"); render(); } break;
    case "pay-add":{ if(!c) return;
      const m=parseFloat((val("pay-montant")||"").replace(",","."));
      if(!m||m<=0){ alert("Indique un montant valide."); return; }
      c.paiements=c.paiements||[];
      c.paiements.push({date:today(),montant:m,note:(val("pay-note")||"").trim()});
      patchField(c,"paiements",err=>toast(err?"Erreur":"Paiement enregistré"));
      render(); break; }
    case "pay-del":{ if(!c) return;
      if(!confirm("Supprimer ce paiement ?")) break;
      c.paiements.splice(+t.dataset.idx,1);
      patchField(c,"paiements",()=>{});
      render(); break; }
    case "rdv-remind":{ const c2=S.clients.find(x=>x.id===t.dataset.id); if(!c2||!c2.prochainRdv) break;
      const d=new Date(c2.prochainRdv);
      const quand=d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})+" à "+d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
      c2.messages=c2.messages||[];
      c2.messages.push({from:"coach",text:`🔔 Rappel : notre séance est prévue ${quand}. À très vite ! 💪`,date:new Date().toISOString(),lu:true});
      patchField(c2,"messages",err=>toast(err?"Erreur":"Rappel envoyé à "+c2.nom));
      break; }
    case "import-open":{ const f=document.getElementById("imp-file"); if(f){ f.value=""; f.click(); } break; }
    case "export":{
      const payload={app:"Alex Coaching",version:1,exportedAt:new Date().toISOString(),clients:S.clients};
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
      const url=URL.createObjectURL(blob),link=document.createElement("a");
      link.href=url; link.download=`coachflow-sauvegarde-${today()}.json`; document.body.appendChild(link); link.click(); link.remove();
      setTimeout(()=>URL.revokeObjectURL(url),1000); break; }
  }
});
document.addEventListener("input",e=>{
  const ci=e.target.closest("[data-ci]");
  if(ci){ const lab=document.getElementById("ci-v-"+ci.dataset.ci); if(lab) lab.textContent=ci.value; return; }
  if(e.target.id==="cl-search"){
    S.q=e.target.value; const pos=e.target.selectionStart; render();
    const el2=document.getElementById("cl-search");
    if(el2){ el2.focus(); try{el2.setSelectionRange(pos,pos);}catch(_){} }
    return;
  }
  if(e.target.id==="msg-text"){ e.target.style.height="auto"; e.target.style.height=Math.min(140,e.target.scrollHeight)+"px"; }
  const eln=e.target.closest("[data-bind-num]");
  if(eln){ const c=sel(); if(!c) return; const v=parseFloat(String(eln.value).replace(",",".")); c[eln.dataset.bindNum]=isNaN(v)?null:v; save(); return; }
  const el=e.target.closest("[data-bind]"); if(!el) return;
  const c=sel(); if(!c) return; c[el.dataset.bind]=el.value; save();
});
document.addEventListener("change",e=>{
  const pk=e.target.closest("[data-pick]");
  if(pk){ const inp=document.getElementById(pk.dataset.pick);
    if(inp&&pk.value){ inp.value=pk.value; pk.value=""; }
    return; }
  if(e.target.id==="imp-file"){
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=async()=>{
      let payload=null;
      try{ payload=JSON.parse(rd.result); }catch(_){ alert("Fichier illisible — choisis une sauvegarde Alex Coaching (.json)."); return; }
      const arr=Array.isArray(payload)?payload:(payload&&payload.clients);
      toast("Import en cours…");
      const res=await importBackupData(arr);
      if(res.bad){ alert("Ce fichier n'est pas une sauvegarde Alex Coaching valide."); return; }
      render();
      alert(`Import terminé :\n• ${res.added} client(s) restauré(s)\n• ${res.skipped} déjà présent(s) (ignorés)${res.failed?`\n• ${res.failed} en échec`:""}`);
    };
    rd.readAsText(f);
    return;
  }
  const nut=e.target.closest("[data-nut]");
  if(nut){ const c=sel(); if(!c) return;
    c.nutrition=c.nutrition||{};
    const k=nut.dataset.nut;
    c.nutrition[k]=(k==="age"||k==="menu")?(parseInt(nut.value)||null):(nut.value||null);
    save(); render(); return; }
  if(e.target.id==="msg-photo" && e.target.files && e.target.files[0]){
    const role=e.target.dataset.role||"coach";
    const c=sel(); if(!c) return;
    toast("Envoi de la photo…");
    compressImage(e.target.files[0], uri=>{
      if(!uri){ alert("Photo illisible."); return; }
      c.messages=c.messages||[];
      c.messages.push({from:role,image:uri,date:new Date().toISOString(),lu:role==="coach"});
      patchField(c,"messages",err=>toast(err?"Erreur envoi":"Photo envoyée"));
      render();
      setTimeout(()=>{const ml=document.getElementById("msg-list");if(ml)ml.scrollTop=ml.scrollHeight;},50);
    });
    e.target.value=""; return;
  }
  const photoInput=e.target.closest('[data-act="add-photo"]');
  if(photoInput && photoInput.files && photoInput.files[0]){
    const file=photoInput.files[0]; const c=sel(); if(!c) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      c.photos=c.photos||[];
      c.photos.push({url:ev.target.result,date:new Date().toISOString().slice(0,10),label:""});
      patchField(c,"photos"); render();
    };
    reader.readAsDataURL(file); return;
  }
  const pick=e.target.closest('[data-act="pick-client"]');
  if(pick){ S.selectedId=pick.value; render(); return; }
  const b=e.target.closest("[data-bind]");
  if(b&&(b.dataset.bind==="formule"||b.dataset.bind==="niveau")){ const c=sel(); if(c){ c[b.dataset.bind]=b.value; save(); render(); } }
});

/* ===== boot ===== */
function setupPWA(){
  try{
    // Favicon = logo
    const fav=document.createElement("link"); fav.rel="icon"; fav.href=LOGO; document.head.appendChild(fav);
    // Manifest : fichier manifest.json réel (icônes fiables sur l'écran d'accueil)
  }catch(e){}
}
function updateOnlineBar(){
  const b=document.getElementById("offbar");
  if(!navigator.onLine){
    if(!b){ const d=document.createElement("div"); d.id="offbar"; d.className="offline-bar"; d.textContent="⚠ Hors ligne — vos modifications ne seront pas enregistrées"; document.body.appendChild(d); }
  } else if(b){ b.remove(); }
}
window.addEventListener("offline",updateOnlineBar);
window.addEventListener("online",()=>{ updateOnlineBar(); toast("Connexion rétablie — synchronisation…"); try{ if(!isTypingOrRecording()) reloadKeepingView(); }catch(e){} });
window.addEventListener("beforeunload",e=>{
  if((typeof PENDING!=="undefined"&&PENDING>0)||(typeof DIRTY!=="undefined"&&DIRTY)){ e.preventDefault(); e.returnValue=""; }
});
function bootApp(){
  setupPWA();
  updateOnlineBar();
  try{
    const mi=location.hash.match(/#invite=([^&]+)/);
    if(mi){ S.inviteEmail=decodeURIComponent(mi[1]); S.authView="signup";
      history.replaceState(null,"",location.pathname+location.search); }
  }catch(e){}
  try{ const dl=document.getElementById("exos-fr"); if(dl) dl.innerHTML=EXOS_GROUPES.map(g=>g[1].map(e=>`<option value="${e}"></option>`).join("")).join(""); }catch(e){}
  const spImg=document.getElementById('splash-img'); if(spImg) spImg.src=LOGO;
  sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  render();
  sb.auth.onAuthStateChange((_evt,session)=>{
    S.session=session||null;
    if(session){ loadClients(); } else { S.clients=[]; S.isClient=false; render(); }
  });
  // Rafraîchit automatiquement les messages toutes les 8 s quand on est dans l'onglet Messages
  setInterval(()=>{
    const onMsg=(S.isClient && S.clientTab==="messages") || (!S.isClient && S.view==="detail" && S.detailTab==="messages");
    if(onMsg && S.session){ reloadKeepingView(); }
  }, 8000);
}
bootApp();
</script>
